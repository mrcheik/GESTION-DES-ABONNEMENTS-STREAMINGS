<header class="mc-header">
  <nav class="mc-nav">
    <a class="mc-brand" routerLink="/accueil" (click)="closeMenu()">
      <span class="mc-brand__logo">MC</span>
      <span class="mc-brand__text">MR <strong>CHEIK</strong></span>
    </a>

    <button
      class="mc-menu-button d-lg-none"
      type="button"
      aria-label="Menu"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu()"
    >
      <i class="bi" [class.bi-list]="!menuOpen" [class.bi-x-lg]="menuOpen"></i>
    </button>

    <div class="mc-nav__panel" [class.is-open]="menuOpen">
      <ul class="mc-nav__links">
        <li>
          <a routerLink="/accueil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Accueil</a>
        </li>
        <li><a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a></li>
        <li><a routerLink="/plans" routerLinkActive="active" (click)="closeMenu()">Forfaits</a></li>
        <li><a routerLink="/providers" routerLinkActive="active" (click)="closeMenu()">Fournisseurs</a></li>
        <li><a routerLink="/orders" routerLinkActive="active" (click)="closeMenu()">Commandes</a></li>
        <li><a routerLink="/subscriptions" routerLinkActive="active" (click)="closeMenu()">Abonnements</a></li>
        <li><a routerLink="/payments" routerLinkActive="active" (click)="closeMenu()">Paiements</a></li>
        <li><a routerLink="/credentials" routerLinkActive="active" (click)="closeMenu()">Identifiants</a></li>
        <li><a routerLink="/support" routerLinkActive="active" (click)="closeMenu()">Support</a></li>
        @if (isAdmin) {
          <li><a routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a></li>
        }
      </ul>

      <div class="mc-header-actions">
        <button *ngIf="isAuthenticated" class="btn btn-logout btn-sm" type="button" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          <span>Déconnexion</span>
        </button>
        <a *ngIf="!isAuthenticated" routerLink="/login" class="btn btn-accent btn-sm" (click)="closeMenu()">
          <i class="bi bi-box-arrow-in-right"></i>
          <span>Connexion</span>
        </a>
      </div>
    </div>
  </nav>
</header>
