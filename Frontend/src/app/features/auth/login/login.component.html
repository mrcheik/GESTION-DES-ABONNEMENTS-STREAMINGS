<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-icon">MC</div>
        <h1 class="h3 fw-bold">Connexion</h1>
        <p class="text-muted mb-0">Accédez à votre espace <strong>MR CHEIK</strong></p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Nom d'utilisateur</label>
          <input
            id="username"
            type="text"
            class="form-control"
            formControlName="username"
            [class.is-invalid]="form.controls.username.touched && form.controls.username.invalid"
          />
        </div>

        <div class="mb-4">
          <label class="form-label" for="password">Mot de passe</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
        </div>

        <button class="btn btn-accent w-100 py-2" type="submit">Se connecter</button>
      </form>

      <p class="text-center mt-4 mb-0">
        Pas encore de compte ? <a routerLink="/register">Créer un compte</a>
      </p>
    </div>
  </div>
</div>
