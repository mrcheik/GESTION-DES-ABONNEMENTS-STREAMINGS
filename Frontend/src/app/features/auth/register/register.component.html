<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-icon">MC</div>
        <h1 class="h3 fw-bold">Inscription</h1>
        <p class="text-muted mb-0">Rejoignez <strong>MR CHEIK</strong></p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="alert alert-success">{{ successMessage }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Nom d'utilisateur</label>
          <input id="username" type="text" class="form-control" formControlName="username" />
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input id="email" type="email" class="form-control" formControlName="email" />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Mot de passe</label>
          <input id="password" type="password" class="form-control" formControlName="password" />
        </div>
        <div class="mb-4">
          <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
          <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword" />
        </div>
        <button class="btn btn-accent w-100 py-2" type="submit">S'inscrire</button>
      </form>

      <p class="text-center mt-4 mb-0">
        Déjà un compte ? <a routerLink="/login">Se connecter</a>
      </p>
    </div>
  </div>
</div>
